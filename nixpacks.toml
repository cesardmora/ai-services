[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_sqlite", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.fileinfo", "php82Extensions.openssl", "php82Extensions.curl"]

[phases.install]
cmds = [
  "curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer",
  "composer install --no-dev --optimize-autoloader --no-interaction"
]

[phases.build]
cmds = [
  "cp .env.example .env",
  "php artisan key:generate --force",
  "chmod -R 775 storage bootstrap/cache",
  "touch database/database.sqlite",
  "php artisan config:clear",
  "php artisan view:clear"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
